<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | CNSSID Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
body { 
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
}        .login-card { box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 3px solid #22c55e; color: #000; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center bg-white border-b border-gray-100">
        <a href="index.html" class="text-xl font-extrabold tracking-tighter">CNSS<span class="text-green-600">ID</span></a>
        <a href="register.html" class="text-sm font-bold text-green-600 hover:underline">New Enrollment?</a>
    </nav>

    <div class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 login-card border    border-gray-100">            
           <div class="text-center mb-6">
             <div class="w-16 h-16 bg-black rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-extrabold text-lg tracking-tighter">SS<span class="text-green-400">ID</span></span>
             </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Access Portal</h1>
                <p class="text-gray-400 text-sm mt-2">Centralized National Social Security Identity</p>
            </div>

            <div class="flex border-b border-gray-100 mb-6 text-sm font-bold text-gray-400">
                <button onclick="switchTab('citizen')" id="tab-citizen" class="flex-1 pb-4 tab-active transition-all">CITIZEN</button>
                <button onclick="switchTab('official')" id="tab-official" class="flex-1 pb-4 transition-all">GOVT OFFICIAL</button>
            </div>

            <!-- Error message box -->
            <div id="error-box" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-2xl flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-500"></i>
                <p id="error-msg" class="text-sm font-semibold text-red-600"></p>
            </div>

            <form id="login-form" class="space-y-3">
                <div class="space-y-1">
                    <label id="id-label" class="text-xs font-bold uppercase tracking-widest text-gray-500">Email Address</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input id="email-input" type="email" placeholder="Enter your email address" 
                            class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition font-medium">
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between">
                        <label class="text-xs font-bold uppercase tracking-widest text-gray-500">Password</label>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
                        <input id="password-input" type="password" placeholder="••••••••" 
                            class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 outline-none transition">
                    </div>
                </div>

                <button id="login-btn" type="submit" 
                    class="w-full py-4 bg-black text-white rounded-2xl font-bold shadow-xl shadow-gray-200 hover:bg-gray-800 transform active:scale-[0.98] transition flex items-center justify-center gap-3">
                    <span id="btn-text">Secure Sign In</span>
                    <i id="btn-icon" class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-50 text-center">
                <div class="flex items-center justify-center gap-2 text-[10px] font-bold text-gray-300 uppercase tracking-[0.2em]">
                    <i class="fa-solid fa-circle-check text-green-500"></i> Encrypted Connection
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

        // ── Tab switching ────────────────────────────────────────
        function switchTab(role) {
            const citizenTab  = document.getElementById('tab-citizen');
            const officialTab = document.getElementById('tab-official');
            const label       = document.getElementById('id-label');

            if (role === 'citizen') {
                citizenTab.classList.add('tab-active');
                officialTab.classList.remove('tab-active');
                label.innerText = 'Email Address';
            } else {
                officialTab.classList.add('tab-active');
                citizenTab.classList.remove('tab-active');
                label.innerText = 'Official Email Address';
            }
        }

        // ── Show error ───────────────────────────────────────────
        function showError(msg) {
            const box = document.getElementById('error-box');
            document.getElementById('error-msg').innerText = msg;
            box.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-box').classList.add('hidden');
        }

        // ── Set loading state on button ──────────────────────────
        function setLoading(loading) {
            const btn  = document.getElementById('login-btn');
            const text = document.getElementById('btn-text');
            const icon = document.getElementById('btn-icon');

            if (loading) {
                btn.disabled = true;
                btn.classList.add('opacity-70');
                text.innerText = 'Verifying...';
                icon.className = 'fa-solid fa-spinner fa-spin';
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                text.innerText = 'Secure Sign In';
                icon.className = 'fa-solid fa-arrow-right';
            }
        }

        // ── Login form submission ────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email    = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || 'Login failed. Please try again.');
                    setLoading(false);
                    return;
                }

                // Save token and user info to localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('role',  data.role);
                localStorage.setItem('name',  data.name);
                localStorage.setItem('ssid',  data.ssid  || '');
                localStorage.setItem('agency', data.agency || '');

                const selectedTab = document.getElementById('tab-citizen').classList.contains('tab-active') ? 'citizen' : 'official';

            // Enforce tab-role match
            if (selectedTab === 'citizen' && data.role !== 'citizen') {
                showError('This account is not a citizen account. Please use the Govt Official tab.');
                setLoading(false);
                return;
            }
            if (selectedTab === 'official' && data.role === 'citizen') {
                showError('This is a citizen account. Please use the Citizen tab.');
                setLoading(false);
                return;
            }

            // Redirect based on role
            if (data.role === 'citizen') {
                window.location.href = 'dashboard.html';
            } else if (data.role === 'official') {
                window.location.href = 'official-dashboard.html';
            } else if (data.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            }

            } catch (err) {
                showError('Could not connect to server. Make sure the backend is running.');
                setLoading(false);
            }
        });

        // ── Redirect if already logged in ───────────────────────
        
    </script>
</body>
</html>
